<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OldMan Kaens — Achievement Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg2: #0f1218;
  --bg3: #141820;
  --border: #1e2530;
  --accent: #00d4ff;
  --accent2: #ff6b35;
  --accent3: #39ff14;
  --text: #c8d4e0;
  --text2: #6a7a8a;
  --text3: #3a4a5a;
  --green: #39ff14;
  --yellow: #ffd700;
  --red: #ff4444;
  --owned-green: rgba(57,255,20,0.08);
  --owned-yellow: rgba(255,215,0,0.08);
  --row-hover: rgba(0,212,255,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse at 20% 0%, rgba(0,212,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(255,107,53,0.03) 0%, transparent 60%);
}

/* HEADER */
header {
  border-bottom: 1px solid var(--border);
  padding: 20px 28px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
}
.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 18px;
  color: var(--accent);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.logo span { color: var(--text2); font-weight: 400; font-size: 12px; margin-left: 10px; font-family: 'Share Tech Mono'; }
.updated { font-family: 'Share Tech Mono'; font-size: 11px; color: var(--text3); }

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat {
  flex: 1;
  background: var(--bg2);
  padding: 14px 20px;
  text-align: center;
}
.stat-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}
.stat-val.orange { color: var(--accent2); }
.stat-val.green { color: var(--accent3); }
.stat-lbl {
  font-size: 10px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
  font-family: 'Share Tech Mono';
}
.platform-pills {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 8px 20px;
}
.pill {
  font-family: 'Share Tech Mono';
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 2px;
  border: 1px solid var(--border);
  color: var(--text2);
}

/* TABS */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  padding: 0 20px;
}
.tab {
  padding: 12px 20px;
  cursor: pointer;
  font-family: 'Share Tech Mono';
  font-size: 12px;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* FILTERS */
.filters {
  display: flex;
  gap: 10px;
  padding: 12px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  align-items: center;
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-label { font-family: 'Share Tech Mono'; font-size: 10px; color: var(--text3); text-transform: uppercase; }
select, input[type=text] {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px;
  font-family: 'Share Tech Mono';
  font-size: 11px;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.15s;
}
select:focus, input:focus { border-color: var(--accent); }
select { cursor: pointer; }
input[type=text] { width: 200px; }
.toggle-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  font-family: 'Share Tech Mono';
  font-size: 11px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.toggle-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }
.result-count { font-family: 'Share Tech Mono'; font-size: 11px; color: var(--text3); margin-left: auto; }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--bg3); border-bottom: 2px solid var(--border); }
th {
  padding: 9px 12px;
  text-align: left;
  font-family: 'Share Tech Mono';
  font-size: 10px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}
th:hover { color: var(--accent); }
th.sorted { color: var(--accent); }
th .sort-arrow { margin-left: 4px; opacity: 0.5; }
td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(30,37,48,0.6);
  vertical-align: middle;
  white-space: nowrap;
}
tr:hover td { background: var(--row-hover); }
tr.green-row td { background: var(--owned-green); }
tr.yellow-row td { background: var(--owned-yellow); }
tr.green-row:hover td, tr.yellow-row:hover td { filter: brightness(1.3); }

.game-name { 
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 280px;
}
.game-name a { color: var(--text); text-decoration: none; transition: color 0.15s; }
.game-name a:hover { color: var(--accent); }
.game-name a.no-link { pointer-events: none; color: var(--text2); }

.badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 2px;
  font-family: 'Share Tech Mono';
  font-size: 10px;
  font-weight: 400;
}
.badge-green { background: rgba(57,255,20,0.12); color: var(--green); border: 1px solid rgba(57,255,20,0.2); }
.badge-yellow { background: rgba(255,215,0,0.12); color: var(--yellow); border: 1px solid rgba(255,215,0,0.2); }
.badge-red { background: rgba(255,68,68,0.12); color: var(--red); border: 1px solid rgba(255,68,68,0.2); }
.badge-blue { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
.badge-orange { background: rgba(255,107,53,0.1); color: var(--accent2); border: 1px solid rgba(255,107,53,0.2); }
.badge-gray { background: rgba(100,120,140,0.1); color: var(--text2); border: 1px solid var(--border); }

.platform-tag { font-family: 'Share Tech Mono'; font-size: 10px; color: var(--text2); }
.gs-val { font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; color: var(--accent); }
.priority-val { font-family: 'Share Tech Mono'; font-size: 11px; color: var(--accent2); }
.pct-val { font-family: 'Share Tech Mono'; font-size: 11px; }
.rating-val { font-family: 'Share Tech Mono'; font-size: 11px; color: var(--yellow); }
.ach-val { font-family: 'Share Tech Mono'; font-size: 11px; }

.flag-icons { display: flex; gap: 4px; }
.flag { width: 14px; height: 14px; border-radius: 2px; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; }

/* PAGINATION */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
}
.page-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  font-family: 'Share Tech Mono';
  font-size: 11px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.page-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.1); }
.page-btn:disabled { opacity: 0.3; cursor: default; }
.page-info { font-family: 'Share Tech Mono'; font-size: 11px; color: var(--text3); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  font-family: 'Share Tech Mono';
}
.empty-state .big { font-size: 32px; margin-bottom: 8px; opacity: 0.3; }

@media (max-width: 768px) {
  .stats-bar { flex-wrap: wrap; }
  .stat { min-width: 50%; }
  .filters { gap: 8px; }
  input[type=text] { width: 140px; }
  .tabs { overflow-x: auto; }
}
</style>
</head>

.4, "hasDLC": false, "hasUnachieveable": false, "unacheiveableCount": 0, "url": "https://www.trueachievements.com/game/AerialKnights-DropShot/achievements"}, {"name": "Hidden Cats in Christmas", "platform": "Xbox Series X|S", "status": "unowned", "gsAvail": 1000, "achRemaining": null, "compTime": "1-2 hours", "difficulty": 1.01, "maxDifficulty": 1.01, "compPct": 89.6, "rating": "3.6", "priority": 887.1, "hasDLC": false, "hasUnachieveable": false, "unacheiveableCount": 0, "url": "https://www.trueachievements.com/game/Hidden-Cats-in-Christmas/achievements"}, {"name": "Cubic Figures", "platform": "Xbox Series X|S", "status": "unowned", "gsAvail": 1000, "achRemaining": null, "compTime": "1-2 hours", "difficulty": 1.27, "maxDifficulty": 1.27, "compPct": 48.9, "rating": "-", "priority": 385.0, "hasDLC": false, "hasUnachieveable": false, "unacheiveableCount": 0, "url": "https://www.trueachievements.com/game/Cubic-Figures/achievements"}, {"name": "Meow Moments: Celebrating Myth & Machine", "platform": "Xbox Series X|S", "status": "unowned", "gsAvail": 1000, "achRemaining": null, "compTime": "1-2 hours", "difficulty": 1.05, "maxDifficulty": 1.05, "compPct": 85.2, "rating": "-", "priority": 811.4, "hasDLC": false, "hasUnachieveable": false, "unacheiveableCount": 0, "url": "https://www.trueachievements.com/game/Meow-Moments-Celebrating-Myth-and-Machine/achievements"}, {"name": "MonsterBlast Infinity", "platform": "Xbox Series X|S", "status": "unowned", "gsAvail": 1000, "achRemaining": null, "compTime": "1-2 hours", "difficulty": 1.09, "maxDifficulty": 1.09, "compPct": 70.7, "rating": "-", "priority": 648.6, "hasDLC": false, "hasUnachieveable": false, "unacheiveableCount": 0, "url": "https://www.trueachievements.com/game/MonsterBlast-Infinity/achievements"}], "stats": {"totalGames": 1342, "totalGS": 1743952, "ownedCount": 1144, "unownedCount": 198, "platforms": {"Xbox Series X|S": 1163, "Windows": 121, "Xbox One": 58}}, "generatedAt": "2026-04-14"};

const GAMES = RAW_DATA.games;
const STATS = RAW_DATA.stats;

const PAGE_SIZE = 50;
let currentTab = 'quickwins';
let currentPage = 1;
let sortCol = 'priority';
let sortDir = -1;
let hideUnach = false;
let hideDLC = false;

// ── Stats bar ────────────────────────────────────────────────────────────────
function renderStats() {
  const totalGS = STATS.totalGS.toLocaleString();
  const ownedGS = GAMES.filter(g=>g.status==='owned').reduce((s,g)=>s+g.gsAvail,0).toLocaleString();
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-val">${STATS.totalGames.toLocaleString()}</div><div class="stat-lbl">Total Games</div></div>
    <div class="stat"><div class="stat-val orange">${totalGS}</div><div class="stat-lbl">Total GS Available</div></div>
    <div class="stat"><div class="stat-val">${STATS.ownedCount}</div><div class="stat-lbl">Owned / In Progress</div></div>
    <div class="stat"><div class="stat-val green">${STATS.unownedCount}</div><div class="stat-lbl">Buy Next Candidates</div></div>
  `;
  const pColors = {'Xbox Series X|S':'#00d4ff','Windows':'#ff6b35','Xbox One':'#39ff14','Xbox 360':'#ffd700'};
  document.getElementById('platformPills').innerHTML = Object.entries(STATS.platforms)
    .map(([p,c]) => `<div class="pill" style="border-color:${pColors[p]||'#333'};color:${pColors[p]||'#aaa'}">${p}: ${c}</div>`).join('');
}

// ── Filter & tab logic ───────────────────────────────────────────────────────
function getTabGames(tab) {
  switch(tab) {
    case 'quickwins': return GAMES.filter(g => g.status==='owned' && g.achRemaining <= 10 && g.difficulty < 1.5);
    case 'buynext':   return GAMES.filter(g => g.status==='unowned');
    case 'inprogress':return GAMES.filter(g => g.status==='owned');
    default:          return GAMES;
  }
}

function applyFilters(games) {
  const platform = document.getElementById('fPlatform').value;
  const status   = document.getElementById('fStatus').value;
  const time     = document.getElementById('fTime').value;
  const search   = document.getElementById('fSearch').value.toLowerCase().trim();
  return games.filter(g => {
    if (platform && g.platform !== platform) return false;
    if (status   && g.status !== status) return false;
    if (time     && g.compTime !== time) return false;
    if (search   && !g.name.toLowerCase().includes(search)) return false;
    if (hideUnach && g.hasUnachieveable) return false;
    if (hideDLC  && g.hasDLC) return false;
    return true;
  });
}

function sortGames(games) {
  return [...games].sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va === null || va === undefined) va = -Infinity;
    if (vb === null || vb === undefined) vb = -Infinity;
    if (typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });
}

// ── Column definitions ───────────────────────────────────────────────────────
const COLS = [
  { key:'name',        label:'Game',         sortKey:'name' },
  { key:'platform',    label:'Platform',     sortKey:'platform' },
  { key:'status',      label:'Status',       sortKey:'status' },
  { key:'gsAvail',     label:'GS',           sortKey:'gsAvail' },
  { key:'achRemaining',label:'Ach',          sortKey:'achRemaining' },
  { key:'compTime',    label:'Comp Time',    sortKey:'compTime' },
  { key:'difficulty',  label:'Difficulty',   sortKey:'difficulty' },
  { key:'compPct',     label:'Comp %',       sortKey:'compPct' },
  { key:'rating',      label:'Rating',       sortKey:'rating' },
  { key:'priority',    label:'Priority ↓',   sortKey:'priority' },
  { key:'flags',       label:'Flags',        sortKey:null },
];

function renderHead() {
  document.getElementById('tableHead').innerHTML = '<tr>' + COLS.map(c => {
    const arrow = c.sortKey ? (sortCol===c.sortKey ? (sortDir===1?'▲':'▼') : '⇅') : '';
    const cls = sortCol===c.sortKey ? 'sorted' : '';
    return `<th class="${cls}" data-sort="${c.sortKey||''}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('') + '</tr>';
}

function diffBadge(v) {
  if (!v || v === 0) return '<span class="badge badge-gray">-</span>';
  const cls = v < 1.3 ? 'badge-green' : v < 2.0 ? 'badge-yellow' : 'badge-red';
  return `<span class="badge ${cls}">${v.toFixed(2)}</span>`;
}

function timeBadge(t) {
  if (!t) return '<span class="badge badge-gray">-</span>';
  const cls = t==='0-0.5 hours'?'badge-green':t==='0.5-1 hour'?'badge-blue':'badge-orange';
  return `<span class="badge ${cls}">${t}</span>`;
}

function rowClass(g) {
  if (g.status !== 'owned') return '';
  if (g.achRemaining <= 5) return 'green-row';
  if (g.achRemaining <= 15) return 'yellow-row';
  return '';
}

function renderRow(g) {
  const gameUrl = g.url || '';
  const nameHtml = gameUrl
    ? `<a href="${gameUrl}" target="_blank">${escHtml(g.name)}</a>`
    : `<a class="no-link">${escHtml(g.name)}</a>`;

  const pColor = {'Xbox Series X|S':'#00d4ff','Windows':'#ff6b35','Xbox One':'#39ff14','Xbox 360':'#ffd700'}[g.platform]||'#6a7a8a';
  const statusBadge = g.status==='owned'
    ? '<span class="badge badge-blue">Owned</span>'
    : '<span class="badge badge-orange">Buy</span>';

  const flags = [
    g.hasDLC ? '<span class="badge badge-gray" title="Has DLC">DLC</span>' : '',
    g.hasUnachieveable ? `<span class="badge badge-red" title="${g.unacheiveableCount} unobtainable">⚠ ${g.unacheiveableCount}</span>` : ''
  ].filter(Boolean).join(' ');

  return `<tr class="${rowClass(g)}">
    <td><div class="game-name">${nameHtml}</div></td>
    <td><span class="platform-tag" style="color:${pColor}">${g.platform}</span></td>
    <td>${statusBadge}</td>
    <td><span class="gs-val">${g.gsAvail.toLocaleString()}</span></td>
    <td><span class="ach-val">${g.achRemaining !== null ? g.achRemaining : '—'}</span></td>
    <td>${timeBadge(g.compTime)}</td>
    <td>${diffBadge(g.difficulty)}</td>
    <td><span class="pct-val">${g.compPct > 0 ? g.compPct.toFixed(1)+'%' : '—'}</span></td>
    <td><span class="rating-val">${g.rating !== '-' && g.rating ? '★ '+g.rating : '—'}</span></td>
    <td><span class="priority-val">${g.priority > 0 ? g.priority.toLocaleString() : '—'}</span></td>
    <td><div class="flag-icons">${flags}</div></td>
  </tr>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Main render ──────────────────────────────────────────────────────────────
function render() {
  const tabGames = getTabGames(currentTab);
  const filtered = applyFilters(tabGames);
  const sorted   = sortGames(filtered);
  const total    = sorted.length;
  const pageCount = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > pageCount) currentPage = 1;
  const slice = sorted.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  renderHead();
  document.getElementById('resultCount').textContent = `${total.toLocaleString()} games`;
  document.getElementById('tableBody').innerHTML = slice.map(renderRow).join('');
  document.getElementById('emptyState').style.display = total === 0 ? 'block' : 'none';
  renderPagination(pageCount, total);
}

function renderPagination(pageCount, total) {
  if (pageCount <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  const start = (currentPage-1)*PAGE_SIZE+1;
  const end   = Math.min(currentPage*PAGE_SIZE, total);
  let pages = [];
  pages.push(`<button class="page-btn" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">← Prev</button>`);
  
  let lo = Math.max(1, currentPage-2), hi = Math.min(pageCount, currentPage+2);
  if (lo > 1) { pages.push(`<button class="page-btn" onclick="goPage(1)">1</button>`); if (lo>2) pages.push('<span class="page-info">…</span>'); }
  for (let i=lo;i<=hi;i++) pages.push(`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`);
  if (hi < pageCount) { if (hi<pageCount-1) pages.push('<span class="page-info">…</span>'); pages.push(`<button class="page-btn" onclick="goPage(${pageCount})">${pageCount}</button>`); }
  
  pages.push(`<button class="page-btn" ${currentPage===pageCount?'disabled':''} onclick="goPage(${currentPage+1})">Next →</button>`);
  pages.push(`<span class="page-info">${start}–${end} of ${total.toLocaleString()}</span>`);
  document.getElementById('pagination').innerHTML = pages.join('');
}

function goPage(p) { currentPage = p; render(); window.scrollTo(0,0); }

// ── Event listeners ──────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.closest('[data-tab]');
  if (!t) return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  currentTab = t.dataset.tab;
  // set sensible default sort per tab
  if (currentTab === 'buynext')    { sortCol = 'priority'; sortDir = -1; }
  if (currentTab === 'quickwins')  { sortCol = 'gsAvail';  sortDir = -1; }
  if (currentTab === 'inprogress') { sortCol = 'gsAvail';  sortDir = -1; }
  if (currentTab === 'all')        { sortCol = 'priority'; sortDir = -1; }
  currentPage = 1;
  render();
});

document.getElementById('tableHead').addEventListener('click', e => {
  const th = e.target.closest('th[data-sort]');
  if (!th || !th.dataset.sort) return;
  const col = th.dataset.sort;
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  currentPage = 1;
  render();
});

['fPlatform','fStatus','fTime'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => { currentPage=1; render(); });
});
document.getElementById('fSearch').addEventListener('input', () => { currentPage=1; render(); });

document.getElementById('btnHideUnach').addEventListener('click', function() {
  hideUnach = !hideUnach;
  this.classList.toggle('active', hideUnach);
  currentPage=1; render();
});
document.getElementById('btnHideDLC').addEventListener('click', function() {
  hideDLC = !hideDLC;
  this.classList.toggle('active', hideDLC);
  currentPage=1; render();
});

// ── Init ─────────────────────────────────────────────────────────────────────
renderStats();
render();
</script>
